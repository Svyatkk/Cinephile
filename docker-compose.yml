services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./server:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - server
      - client

  server:
    build:
      context: .
      dockerfile: ./docker/server/Dockerfile
    volumes:
      - ./server:/var/www/html
    depends_on:
      - db

  client:
    build:
      context: ./client
      dockerfile: ../docker/client/Dockerfile
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: cinephile_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: cinephile_user
      MYSQL_PASSWORD: secretpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data:


