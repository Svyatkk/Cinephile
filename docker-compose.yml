services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./server:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - server
      - client

  server:
    build:
      context: .
      dockerfile: ./docker/server/Dockerfile
    volumes:
      - ./server:/var/www/html

  client:
    build:
      context: ./client
      dockerfile: ../docker/client/Dockerfile
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
